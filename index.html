<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truvah | Understanding Your Conversations</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght=0,300;0,400;0,500;0,600;0,700;1,300&family=Playfair+Display:ital,wght=0,400;0,500;1,400&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .custom-transition { transition: all 1.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes textFade { 0% { opacity: 1; filter: blur(0); } 100% { opacity: 0; filter: blur(2px); } }
        .animate-text-fade { animation: textFade 0.8s ease-out forwards; }
        @keyframes slideIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-banner-slide { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-[#FAF9F5] text-stone-800 min-h-screen flex flex-col justify-between selection:bg-stone-200 antialiased">

    <header class="bg-[#FAF9F5]/80 backdrop-blur-md sticky top-0 z-50 border-b border-stone-200/40 py-4 px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-stone-300 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-stone-800"></span>
                </div>
                <span class="text-[10px] tracking-[0.2em] font-medium text-stone-400 uppercase">Ask</span>
                <span class="text-xl font-bold tracking-tight text-stone-900 serif-font italic">Truvah</span>
            </div>
            <div id="modelBadge" class="hidden text-[10px] bg-white text-stone-500 tracking-wider px-3 py-1 rounded border border-stone-200/60 shadow-3xs">
                System Active: <span id="modelNameText" class="font-semibold text-stone-800">Online</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-6 md:p-12 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start">
        <section class="lg:col-span-5 space-y-6 lg:sticky lg:top-24">
            <div class="bg-white p-6 rounded-2xl border border-stone-200/60 shadow-xs space-y-5">
                <textarea id="chatInput" rows="8" placeholder="Paste conversation..." class="w-full p-4 bg-[#FAF9F5] border border-stone-200/60 rounded-xl focus:outline-none focus:ring-1 focus:ring-stone-400 focus:border-stone-400 text-sm tracking-wide font-light placeholder-stone-300"></textarea>
                <button id="analyzeBtn" onclick="analyzeChat()" class="w-full bg-stone-950 hover:bg-stone-800 text-[#FAF9F5] font-medium py-3.5 rounded-xl transition-all cursor-pointer flex justify-center items-center gap-3 text-xs uppercase shadow-xs">
                    Analyze Conversation
                </button>
            </div>
        </section>

        <section class="lg:col-span-7 w-full">
            <div id="emptyState" class="bg-white border border-stone-200/40 rounded-2xl p-12 text-center text-stone-400 font-light text-sm shadow-xs min-h-[350px] flex items-center justify-center">
                Your Analysis Dashboard
            </div>
            <div id="resultSection" class="hidden bg-white p-8 rounded-2xl border border-stone-200/60 shadow-xs space-y-8">
                <div class="flex flex-col sm:flex-row justify-between items-center border-b border-stone-100 pb-8">
                    <span id="bondStrengthMeter" class="text-3xl font-serif">0%</span>
                </div>
                <div class="pt-6 border-t border-stone-100 flex justify-center">
                    <button id="emailReportBtn" class="bg-stone-100 hover:bg-stone-200 text-stone-700 py-2 px-6 rounded-lg text-xs font-bold uppercase tracking-widest transition">
                        Email This Report
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let latestAnalytics = null;

        async function analyzeChat() {
            const chatInputElem = document.getElementById('chatInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const chatLog = chatInputElem.value.trim();
            
            if (!chatLog) return alert('Please paste some text.');

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = 'Analyzing...';
            
            try {
                const response = await fetch("/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chatLog })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Processing failed.');

                latestAnalytics = data.analytics;
                
                // UI updates
                document.getElementById('bondStrengthMeter').innerText = latestAnalytics.bond_strength || '0%';
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('modelBadge').classList.remove('hidden');
                
            } catch (err) {
                alert(err.message);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = 'Analyze Conversation';
            }
        }

        document.getElementById('emailReportBtn').addEventListener('click', async () => {
            if (!latestAnalytics) return alert("No analysis data available.");
            const email = prompt("Enter your email address:");
            if (!email) return;

            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipientEmail: email, analytics: latestAnalytics })
                });
                if (response.ok) alert("Report sent!");
            } catch (e) {
                alert("Failed to send email.");
            }
        });
    </script>
</body>
</html>
